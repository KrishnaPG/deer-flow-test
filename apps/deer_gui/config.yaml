# DeerFlow configuration for deer-gui
# See 3rdParty/deer-flow/config.example.yaml for full reference.
#
# REQUIRED: Set these environment variables before running:
#   OPENAI_API_KEY   - your API key for the OpenAI-compatible endpoint
#
# Then update base_url and model below to match your provider.

config_version: 3

log_level: info

token_usage:
  enabled: true

# ============================================================================
# Models
# ============================================================================
models:
  - name: openai-compatible
    display_name: OpenAI Compatible
    use: langchain_openai:ChatOpenAI
    model: big-pickle                    # <-- change to your model name
    api_key: $OPENAI_API_KEY
    base_url: https://opencode.ai/zen/v1  # <-- change to your endpoint
    max_tokens: 4096
    temperature: 0.7
    supports_vision: true

# ============================================================================
# Tool Groups
# ============================================================================
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

# ============================================================================
# Tools
# ============================================================================
tools:
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5

  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

# ============================================================================
# Tool Search
# ============================================================================
tool_search:
  enabled: false

# ============================================================================
# Sandbox (local)
# ============================================================================
sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider

# ============================================================================
# Skills
# ============================================================================
skills:
  container_path: /mnt/skills

# ============================================================================
# Title Generation
# ============================================================================
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

# ============================================================================
# Summarization
# ============================================================================
summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null

# ============================================================================
# Memory
# ============================================================================
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

# ============================================================================
# Checkpointer (SQLite for persistence)
# ============================================================================
checkpointer:
  type: sqlite
  connection_string: checkpoints.db
