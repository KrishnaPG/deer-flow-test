name: "Redis (Hot Lane)"
id: "redis"
icon: "activity"
default_port: 6379
connection_url_pattern: "redis://${HOST}:${PORT:-6379}"
env_vars:
  - key: PORT
    description: "Host port to expose (default: 6379)"
    default: "6379"
  - key: DATA_PATH
    description: "Host path for data persistence (default: ./data)"
    default: "./data"
exports:
  "redis.url": "redis://${HOST}:${PORT:-6379}"
health_check:
  type: "tcp"
  port: 6379
docker_compose: |
  services:
    redis:
      image: redis:7-alpine
      command: redis-server --appendonly yes
      ports:
        - "${PORT:-6379}:6379"
      volumes:
        - ${DATA_PATH:-./data}:/data