name: "NATS JetStream (Bootstrap)"
id: "nats"
icon: "message-square"
default_port: 4222
env_vars: []
health_check:
  type: "tcp"
  port: 4222
docker_compose: |
  services:
    nats:
      image: nats:2.10-alpine
      command: ["-js", "-m", "8222"]
      ports:
        - "4222:4222"
        - "8222:8222"
      volumes:
        - nats_data:/data
  volumes:
    nats_data:
