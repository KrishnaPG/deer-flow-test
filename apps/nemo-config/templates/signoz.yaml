name: "SigNoz (Telemetry)"
id: "signoz"
icon: "activity"
default_port: 3301
connection_url_pattern: "http://${HOST}:3301"
env_vars:
  - key: PORT
    description: "Host port to expose (default: 3301)"
    default: "3301"
  - key: DATA_PATH
    description: "Host path for data persistence (default: ./data)"
    default: "./data"
exports:
  "signoz.url": "http://${HOST}:3301"
health_check:
  type: "http"
  port: 3301
  path: "/"
docker_compose: |
  services:
    signoz-frontend:
      image: signoz/frontend:latest
      ports:
        - "${PORT:-3301}:3301"
    otel-collector:
      image: signoz/signoz-otel-collector:latest
      ports:
        - "4317:4317"
        - "4318:4318"
      volumes:
        - ${DATA_PATH:-./data}:/var/otel