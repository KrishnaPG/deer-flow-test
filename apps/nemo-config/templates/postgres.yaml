name: "PostgreSQL (pgvector)"
id: "postgres"
icon: "database"
default_port: 5432
connection_url_pattern: "postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@${HOST}:5432/${POSTGRES_DB:-state_server}"
env_vars:
  - key: POSTGRES_USER
    description: "Database User"
    default: "admin"
  - key: POSTGRES_PASSWORD
    description: "Database Password"
    secret: true
  - key: POSTGRES_DB
    description: "Database Name"
    default: "state_server"
exports:
  "postgres.url": "postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@${HOST}:5432/${POSTGRES_DB:-state_server}"
  "postgres.user": "${POSTGRES_USER:-admin}"
  "postgres.password": "${POSTGRES_PASSWORD:-password}"
  "postgres.database": "${POSTGRES_DB:-state_server}"
health_check:
  type: "tcp"
  port: 5432
docker_compose: |
  services:
    postgres:
      image: pgvector/pgvector:pg16
      environment:
        POSTGRES_DB: state_server
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ports:
        - "5432:5432"
      volumes:
        - pg_data:/var/lib/postgresql/data
  volumes:
    pg_data: