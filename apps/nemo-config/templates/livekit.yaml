name: "LiveKit (WebRTC Audio/Video)"
id: "livekit"
icon: "message-square"
default_port: 7880
connection_url_pattern: "wss://${HOST}:7880"
env_vars:
  - key: LIVEKIT_API_KEY
    description: "API Key"
    default: "devkey"
  - key: LIVEKIT_API_SECRET
    description: "API Secret"
    secret: true
    default: "secret"
  - key: PORT
    description: "Host port to expose (default: 7880)"
    default: "7880"
  - key: DATA_PATH
    description: "Host path for data persistence (default: ./data)"
    default: "./data"
exports:
  "livekit.url": "wss://${HOST}:7880"
  "livekit.api_key": "${LIVEKIT_API_KEY:-devkey}"
  "livekit.api_secret": "${LIVEKIT_API_SECRET:-secret}"
health_check:
  type: "http"
  port: 7880
  path: "/"
docker_compose: |
  services:
    livekit:
      image: livekit/livekit-server:latest
      command: --dev --keys "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      ports:
        - "${PORT:-7880}:7880"
        - "7881:7881"
        - "50000-50200:50000-50200/udp"
      volumes:
        - ${DATA_PATH:-./data}:/var/livekit