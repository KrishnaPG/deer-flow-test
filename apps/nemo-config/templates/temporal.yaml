name: "Temporal (Orchestrator)"
id: "temporal"
icon: "activity"
default_port: 7233
connection_url_pattern: "${HOST}:7233"
env_vars:
  - key: POSTGRES_URL
    description: "Postgres Connection string for Temporal"
    default: "postgres://admin:password@localhost:5432/temporal"
  - key: DATA_PATH
    description: "Host path for data persistence"
    default: "./data"
exports:
  "temporal.url": "${HOST}:7233"
health_check:
  type: "http"
  port: 7233
  path: "/health"
docker_compose: |
  services:
    temporal:
      image: temporalio/auto-setup:latest
      environment:
        - DB=postgresql
        - DB_PORT=5432
        - POSTGRES_USER=admin
        - POSTGRES_PWD=password
        - POSTGRES_SEEDS=localhost 
      ports:
        - "7233:7233"
        - "8233:8233"
      volumes:
        - ${DATA_PATH:-./data}:/etc/temporal/config