name: "Temporal (Orchestrator)"
id: "temporal"
icon: "activity"
default_port: 7233
connection_url_pattern: "${HOST}:7233"
env_vars:
  - key: POSTGRES_URL
    description: "Postgres Connection string for Temporal"
    default: "postgres://admin:password@localhost:5432/temporal"
health_check:
  type: "tcp"
  port: 7233
docker_compose: |
  services:
    temporal:
      image: temporalio/auto-setup:latest
      environment:
        - DB=postgresql
        - DB_PORT=5432
        # Temporal auto-setup expects host/user/pwd, this is simplified for the demo, 
        # ideally the backend substitution handles parsing the URL
        - POSTGRES_USER=admin
        - POSTGRES_PWD=password
        - POSTGRES_SEEDS=localhost 
      ports:
        - "7233:7233"
        - "8233:8233" # Web UI
