name: "MinIO (Object Storage)"
id: "minio"
icon: "box"
default_port: 9000
connection_url_pattern: "http://${HOST}:9000"
env_vars:
  - key: MINIO_ROOT_USER
    description: "Root Username"
    default: "admin"
  - key: MINIO_ROOT_PASSWORD
    description: "Root Password"
    secret: true
  - key: PORT
    description: "Host port to expose (default: 9000)"
    default: "9000"
  - key: DATA_PATH
    description: "Host path for data persistence (default: ./data)"
    default: "./data"
exports:
  "minio.url": "http://${HOST}:9000"
  "minio.access_key": "${MINIO_ROOT_USER:-admin}"
  "minio.secret_key": "${MINIO_ROOT_PASSWORD:-password}"
health_check:
  type: "http"
  port: 9000
  path: "/minio/health/live"
docker_compose: |
  services:
    minio:
      image: minio/minio:latest
      command: server /data --console-address ":9001"
      environment:
        MINIO_ROOT_USER: ${MINIO_ROOT_USER}
        MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ports:
        - "${PORT:-9000}:9000"
        - "9001:9001"
      volumes:
        - ${DATA_PATH:-./data}:/data