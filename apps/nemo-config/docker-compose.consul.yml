version: "3.8"

services:
  consul:
    image: hashicorp/consul:1.17
    container_name: nemo-consul
    hostname: consul-server
    ports:
      - "8500:8500"
      - "8300:8300"
      - "8301:8301"
      - "8301:8301/udp"
      - "8302:8302"
      - "8302:8302/udp"
    volumes:
      - consul-data:/consul/data
    environment:
      - CONSUL_BIND_INTERFACE=eth0
    command: >
      consul agent -server -bootstrap-expect=1 
      -ui 
      -client=0.0.0.0 
      -bind='{{ GetInterfaceIP "eth0" }}'
      -data-dir=/consul/data
      -retry-join=consul-server
      -log-level=INFO
      -recursor=8.8.8.8
    restart: unless-stopped
    networks:
      - nemo-network
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Consul exporter for Prometheus metrics
  consul-exporter:
    image: prom/consul-exporter:v0.9.0
    container_name: consul-exporter
    command:
      - '--consul.server=consul:8500'
    ports:
      - "9107:9107"
    depends_on:
      - consul
    networks:
      - nemo-network
    restart: unless-stopped

volumes:
  consul-data:
    driver: local

networks:
  nemo-network:
    driver: bridge
